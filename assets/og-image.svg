<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Naturally Elevated Co. — Desert Skies. Elevated Minds.">
  <title>Naturally Elevated Co. | Desert Skies. Elevated Minds.</title>
  <defs>
    <radialGradient id="og-warm" cx="50%" cy="100%" r="70%">
      <stop offset="0%"   stop-color="#C4602A" stop-opacity="0.35"/>
      <stop offset="45%"  stop-color="#8B3A1A" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0C0B09" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="og-cool" cx="28%" cy="55%" r="40%">
      <stop offset="0%"   stop-color="#3A2A5A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0C0B09" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="og-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0C0B09"/>
      <stop offset="60%"  stop-color="#110D09"/>
      <stop offset="100%" stop-color="#1E100A"/>
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="1200" height="630" fill="url(#og-sky)"/>
  <rect width="1200" height="630" fill="url(#og-warm)"/>
  <rect width="1200" height="630" fill="url(#og-cool)"/>

  <!-- Stars — scattered across sky -->
  <g fill="#EDE8DC">
    <circle cx="60"  cy="40"  r="1.2" opacity="0.7"/>
    <circle cx="145" cy="22"  r="0.9" opacity="0.5"/>
    <circle cx="210" cy="58"  r="1.4" opacity="0.8"/>
    <circle cx="290" cy="18"  r="1"   opacity="0.6"/>
    <circle cx="380" cy="45"  r="1.2" opacity="0.7"/>
    <circle cx="430" cy="10"  r="0.8" opacity="0.4"/>
    <circle cx="510" cy="35"  r="1.5" opacity="0.9"/>
    <circle cx="590" cy="55"  r="1"   opacity="0.5"/>
    <circle cx="660" cy="15"  r="1.3" opacity="0.7"/>
    <circle cx="740" cy="48"  r="0.9" opacity="0.5"/>
    <circle cx="820" cy="25"  r="1.4" opacity="0.8"/>
    <circle cx="890" cy="62"  r="1"   opacity="0.6"/>
    <circle cx="960" cy="20"  r="1.2" opacity="0.7"/>
    <circle cx="1040" cy="50" r="0.8" opacity="0.4"/>
    <circle cx="1100" cy="30" r="1.5" opacity="0.9"/>
    <circle cx="1160" cy="42" r="1"   opacity="0.6"/>
    <circle cx="80"  cy="90"  r="0.8" opacity="0.4"/>
    <circle cx="175" cy="80"  r="1.1" opacity="0.6"/>
    <circle cx="320" cy="72"  r="0.9" opacity="0.5"/>
    <circle cx="465" cy="88"  r="1.2" opacity="0.7"/>
    <circle cx="620" cy="75"  r="0.8" opacity="0.4"/>
    <circle cx="780" cy="82"  r="1"   opacity="0.6"/>
    <circle cx="930" cy="68"  r="1.3" opacity="0.7"/>
    <circle cx="1080" cy="90" r="0.9" opacity="0.5"/>
    <circle cx="1180" cy="70" r="1.1" opacity="0.6"/>
  </g>

  <!-- Horizon warm glow line -->
  <rect x="0" y="478" width="1200" height="3" fill="#C4602A" opacity="0.18"/>
  <rect x="0" y="476" width="1200" height="1" fill="#D4952A" opacity="0.12"/>

  <!-- Ground -->
  <rect x="0" y="480" width="1200" height="150" fill="#0A0906"/>

  <!-- Cactus silhouettes — right side -->
  <!-- Far right, tall -->
  <g fill="#0D0B08">
    <rect x="1020" y="320" width="22" height="162" rx="5"/>
    <rect x="968"  y="368" width="52" height="18" rx="6"/>
    <rect x="968"  y="322" width="18" height="64" rx="6"/>
    <rect x="1042" y="380" width="50" height="18" rx="6"/>
    <rect x="1074" y="330" width="18" height="68" rx="6"/>
  </g>
  <!-- Mid-right, medium -->
  <g fill="#0D0B08">
    <rect x="920" y="380" width="16" height="102" rx="4"/>
    <rect x="878" y="412" width="42" height="14" rx="5"/>
    <rect x="878" y="378" width="14" height="48" rx="5"/>
    <rect x="936" y="418" width="38" height="14" rx="5"/>
    <rect x="960" y="388" width="14" height="44" rx="5"/>
  </g>
  <!-- Far right small -->
  <g fill="#0D0B08">
    <rect x="1130" y="410" width="13" height="72" rx="4"/>
    <rect x="1100" y="435" width="30" height="12" rx="4"/>
    <rect x="1100" y="412" width="12" height="35" rx="4"/>
    <rect x="1143" y="440" width="28" height="12" rx="4"/>
    <rect x="1159" y="418" width="12" height="34" rx="4"/>
  </g>
  <!-- Left small cactus -->
  <g fill="#0D0B08">
    <rect x="80"  y="420" width="13" height="62" rx="4"/>
    <rect x="52"  y="442" width="28" height="11" rx="4"/>
    <rect x="52"  y="422" width="11" height="30" rx="4"/>
    <rect x="93"  y="446" width="26" height="11" rx="4"/>
    <rect x="107" y="428" width="11" height="28" rx="4"/>
  </g>

  <!-- ── Logo mark — left section ── -->
  <!-- Logo circle background -->
  <circle cx="220" cy="280" r="88" fill="#1A1714" stroke="#3A332A" stroke-width="1.5"/>
  <circle cx="220" cy="280" r="80" fill="none" stroke="#2E2822" stroke-width="0.75" stroke-dasharray="4 4"/>

  <!-- Zia rays — North -->
  <g fill="#D4952A">
    <rect x="214" y="213" width="3"   height="12" rx="1.5"/>
    <rect x="217.5" y="210" width="3.5" height="15" rx="1.75"/>
    <rect x="221" y="210" width="3.5" height="15" rx="1.75"/>
    <rect x="224.5" y="213" width="3" height="12" rx="1.5"/>
  </g>
  <!-- South -->
  <g fill="#D4952A" transform="rotate(180 220 280)">
    <rect x="214" y="213" width="3"   height="12" rx="1.5"/>
    <rect x="217.5" y="210" width="3.5" height="15" rx="1.75"/>
    <rect x="221" y="210" width="3.5" height="15" rx="1.75"/>
    <rect x="224.5" y="213" width="3" height="12" rx="1.5"/>
  </g>
  <!-- East -->
  <g fill="#D4952A" transform="rotate(90 220 280)">
    <rect x="214" y="213" width="3"   height="12" rx="1.5"/>
    <rect x="217.5" y="210" width="3.5" height="15" rx="1.75"/>
    <rect x="221" y="210" width="3.5" height="15" rx="1.75"/>
    <rect x="224.5" y="213" width="3" height="12" rx="1.5"/>
  </g>
  <!-- West -->
  <g fill="#D4952A" transform="rotate(270 220 280)">
    <rect x="214" y="213" width="3"   height="12" rx="1.5"/>
    <rect x="217.5" y="210" width="3.5" height="15" rx="1.75"/>
    <rect x="221" y="210" width="3.5" height="15" rx="1.75"/>
    <rect x="224.5" y="213" width="3" height="12" rx="1.5"/>
  </g>
  <!-- Center disc -->
  <circle cx="220" cy="280" r="18" fill="#D4952A"/>
  <!-- Cactus on disc -->
  <rect x="215.5" y="254" width="9"  height="32" rx="4.5" fill="#C4602A"/>
  <rect x="200"   y="267" width="16" height="7"  rx="3.5" fill="#C4602A"/>
  <rect x="200"   y="254" width="7"  height="20" rx="3.5" fill="#C4602A"/>
  <rect x="224.5" y="267" width="16" height="7"  rx="3.5" fill="#C4602A"/>
  <rect x="233.5" y="254" width="7"  height="20" rx="3.5" fill="#C4602A"/>

  <!-- ── Brand text — right of logo ── -->
  <!-- Brand name -->
  <text x="370" y="248"
        font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
        font-size="62" font-weight="900"
        letter-spacing="-1.5"
        fill="#EDE8DC">NATURALLY</text>
  <text x="370" y="320"
        font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
        font-size="62" font-weight="900"
        letter-spacing="-1.5"
        fill="#EDE8DC">ELEVATED CO.</text>

  <!-- Divider line -->
  <rect x="370" y="342" width="560" height="1.5" fill="#C4602A" opacity="0.6"/>

  <!-- Tagline -->
  <text x="370" y="382"
        font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
        font-size="26" font-weight="300"
        letter-spacing="3"
        fill="#A8937A">DESERT SKIES · ELEVATED MINDS</text>

  <!-- Location -->
  <text x="370" y="424"
        font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="600"
        letter-spacing="5"
        fill="#C4602A">NEW MEXICO · EST. 2024</text>

  <!-- URL pill -->
  <rect x="370" y="455" width="252" height="36" rx="4" fill="#1F1C18" stroke="#3A332A" stroke-width="1"/>
  <text x="496" y="479"
        text-anchor="middle"
        font-family="'Outfit', 'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="600"
        letter-spacing="2"
        fill="#A8937A">naturallyelevated.co</text>
</svg>
