<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Naturally Elevated Co.">
  <title>Naturally Elevated Co.</title>

  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="#141210"/>

  <!-- Zia sun — North rays -->
  <g fill="#D4952A">
    <rect x="45.5" y="10" width="3"   height="10" rx="1.5"/>
    <rect x="48.5" y="7.5" width="3.5" height="12" rx="1.75"/>
    <rect x="52"   y="7.5" width="3.5" height="12" rx="1.75"/>
    <rect x="55.5" y="10"  width="3"   height="10" rx="1.5"/>
  </g>
  <!-- South rays -->
  <g fill="#D4952A" transform="rotate(180 50 50)">
    <rect x="45.5" y="10" width="3"   height="10" rx="1.5"/>
    <rect x="48.5" y="7.5" width="3.5" height="12" rx="1.75"/>
    <rect x="52"   y="7.5" width="3.5" height="12" rx="1.75"/>
    <rect x="55.5" y="10"  width="3"   height="10" rx="1.5"/>
  </g>
  <!-- East rays -->
  <g fill="#D4952A" transform="rotate(90 50 50)">
    <rect x="45.5" y="10" width="3"   height="10" rx="1.5"/>
    <rect x="48.5" y="7.5" width="3.5" height="12" rx="1.75"/>
    <rect x="52"   y="7.5" width="3.5" height="12" rx="1.75"/>
    <rect x="55.5" y="10"  width="3"   height="10" rx="1.5"/>
  </g>
  <!-- West rays -->
  <g fill="#D4952A" transform="rotate(270 50 50)">
    <rect x="45.5" y="10" width="3"   height="10" rx="1.5"/>
    <rect x="48.5" y="7.5" width="3.5" height="12" rx="1.75"/>
    <rect x="52"   y="7.5" width="3.5" height="12" rx="1.75"/>
    <rect x="55.5" y="10"  width="3"   height="10" rx="1.5"/>
  </g>

  <!-- Zia center disc -->
  <circle cx="50" cy="50" r="16" fill="#D4952A"/>

  <!-- Cactus silhouette — terracotta, on top of sun disc -->
  <!-- Main trunk -->
  <rect x="46.5" y="26" width="7" height="30" rx="3.5" fill="#C4602A"/>
  <!-- Left arm horizontal -->
  <rect x="33"   y="36" width="13.5" height="6" rx="3" fill="#C4602A"/>
  <!-- Left arm vertical -->
  <rect x="33"   y="26" width="6"    height="16" rx="3" fill="#C4602A"/>
  <!-- Right arm horizontal -->
  <rect x="53.5" y="36" width="13.5" height="6" rx="3" fill="#C4602A"/>
  <!-- Right arm vertical -->
  <rect x="61"   y="26" width="6"    height="16" rx="3" fill="#C4602A"/>
</svg>
