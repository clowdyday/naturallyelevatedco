[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Proxy /api/* → Netlify Functions (must come before the SPA catch-all)
[[redirects]]
  from = "/api/*"
  to   = "/.netlify/functions/:splat"
  status = 200

# SPA catch-all — serves index.html for all non-asset routes
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
